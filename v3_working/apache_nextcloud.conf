<VirtualHost *:80>
    ServerName your-nextcloud-domain
    DocumentRoot /var/www/nextcloud

    <Directory /var/www/nextcloud>
        Require all granted
        AllowOverride All
        Options FollowSymLinks MultiViews
        <IfModule mod_dav.c>
            Dav off
        </IfModule>
    </Directory>
</VirtualHost>

<VirtualHost *:443>
    ServerName your-nextcloud-domain
    DocumentRoot /var/www/nextcloud

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/ssl-cert-snakeoil.pem
    SSLCertificateKeyFile /etc/ssl/private/ssl-cert-snakeoil.key

    # SSL Proxy Settings
    SSLProxyEngine on
    SSLProxyVerify none
    SSLProxyCheckPeerCN off
    SSLProxyCheckPeerName off

    # Исключения для статических файлов Nextcloud (НЕ проксировать!)
    # Должны быть ДО ProxyPassMatch!
    ProxyPass /core !
    ProxyPass /apps !
    ProxyPass /dist !
    ProxyPass /js !
    ProxyPass /css !
    ProxyPass /l10n !
    ProxyPass /index.php !

    # Проверка авторизации для 1С прокси
    # Если нет cookie nc_username - редирект на вход
    <Location ~ "^/([a-zA-Z0-9_-]+)/">
        RewriteEngine On
        RewriteCond %{HTTP_COOKIE} !nc_username [NC]
        RewriteRule ^.*$ /index.php/login?redirect_url=%{REQUEST_URI} [R=302,L]
    </Location>

    # 1C Proxy - ДО Directory директивы!
    # Динамический прокси для всех баз 1С
    # Проксирует любой запрос вида /{база}/... на https://10.72.1.5/{база}/...
    ProxyPassMatch ^/([a-zA-Z0-9_-]+)/(.*)$ https://10.72.1.5/$1/$2 retry=0 timeout=60
    ProxyPassReverse ^/([a-zA-Z0-9_-]+)/(.*)$ https://10.72.1.5/$1/$2
    ProxyPassReverseCookiePath / /

    # Заголовки для разрешения фреймов и CSP
    Header unset X-Frame-Options
    Header always set Content-Security-Policy "frame-ancestors 'self' https://your-nextcloud-domain; frame-src *; connect-src *; script-src 'self' 'unsafe-inline' 'unsafe-eval' *; style-src 'self' 'unsafe-inline' *;"

    <Directory /var/www/nextcloud>
        Require all granted
        AllowOverride All
        Options FollowSymLinks MultiViews
        <IfModule mod_dav.c>
            Dav off
        </IfModule>
    </Directory>
</VirtualHost>
